spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

totp:
  window-size: 1
  period: 30

app:
  webauthn:
    rp-id: localhost
    rp-name: Auth Portal
    origin: http://localhost:8080
