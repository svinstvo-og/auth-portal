<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login</title>
</head>
<body>
<h1>Sign In</h1>

<div th:if="${param.error}" style="color:red">Invalid username or password.</div>
<div th:if="${param.logout}" style="color:green">You have been logged out.</div>
<div th:if="${param.registered}" style="color:green">Registration complete — please log in.</div>

<form method="post" th:action="@{/login}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <p>
        <label>Username<br/>
            <input type="text" name="username" required autofocus/>
        </label>
    </p>
    <p>
        <label>Password<br/>
            <input type="password" name="password" required/>
        </label>
    </p>
    <button type="submit">Sign In</button>
</form>

<p><a th:href="@{/register}">No account? Register</a></p>
</body>
</html>
