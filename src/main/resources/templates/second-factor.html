<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verify Your Identity</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="card">
    <h1>Two-Factor Verification</h1>
    <p>Choose a verification method:</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section>
        <h2>Authenticator App (TOTP)</h2>
        <form method="post" th:action="@{/second-factor/totp}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>6-digit code
                <input type="text" name="code" maxlength="6" pattern="[0-9]{6}"
                       inputmode="numeric" autocomplete="one-time-code" required/>
            </label>
            <button type="submit">Verify Code</button>
        </form>
    </section>

    <hr/>

    <section>
        <h2>Passkey / Security Key</h2>
        <button id="webauthn-btn" onclick="startWebAuthn()">Use Passkey</button>
        <div id="webauthn-error" class="alert alert-error" style="margin-top:0.75rem"></div>
    </section>
</div>

<script th:inline="javascript">
    async function startWebAuthn() {
        try {
            const startResp = await fetch('/webauthn/authenticate/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });
            const optionsWrapper = await startResp.json();
            const options = optionsWrapper.publicKey;

            options.challenge = base64urlDecode(options.challenge);
            if (options.allowCredentials) {
                options.allowCredentials = options.allowCredentials.map(c => ({
                    ...c,
                    id: base64urlDecode(c.id)
                }));
            }

            const credential = await navigator.credentials.get({ publicKey: options });

            const finishResp = await fetch('/webauthn/authenticate/finish', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: credential.id,
                    rawId: base64urlEncode(credential.rawId),
                    type: credential.type,
                    clientExtensionResults: credential.getClientExtensionResults(),
                    response: {
                        clientDataJSON: base64urlEncode(credential.response.clientDataJSON),
                        authenticatorData: base64urlEncode(credential.response.authenticatorData),
                        signature: base64urlEncode(credential.response.signature),
                        userHandle: credential.response.userHandle
                            ? base64urlEncode(credential.response.userHandle) : null
                    }
                })
            });

            if (finishResp.ok) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('webauthn-error').textContent =
                    'Passkey verification failed. Please try again.';
            }
        } catch (e) {
            document.getElementById('webauthn-error').textContent = 'Error: ' + e.message;
        }
    }

    function base64urlDecode(str) {
        const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
    }

    function base64urlEncode(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        bytes.forEach(b => binary += String.fromCharCode(b));
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
</script>
</body>
</html>
