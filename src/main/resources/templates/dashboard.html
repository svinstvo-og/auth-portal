<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="card wide">
    <h1>Welcome, <span th:text="${username}">user</span>!</h1>
    <p>You are fully authenticated.</p>

    <h2>Register a Passkey</h2>
    <button onclick="registerPasskey()">Add Passkey</button>
    <div id="passkey-msg" class="alert alert-info" style="margin-top:0.75rem"></div>

    <p><a th:href="@{/logout}">Sign out</a></p>
</div>

<script>
    async function registerPasskey() {
        try {
            const startResp = await fetch('/webauthn/register/start', { method: 'POST' });
            const optionsWrapper = await startResp.json();
            const options = optionsWrapper.publicKey;

            options.challenge = base64urlDecode(options.challenge);
            options.user.id   = base64urlDecode(options.user.id);

            const credential = await navigator.credentials.create({ publicKey: options });

            const finishResp = await fetch('/webauthn/register/finish', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: credential.id,
                    rawId: base64urlEncode(credential.rawId),
                    type: credential.type,
                    response: {
                        clientDataJSON:    base64urlEncode(credential.response.clientDataJSON),
                        attestationObject: base64urlEncode(credential.response.attestationObject)
                    }
                })
            });

            document.getElementById('passkey-msg').textContent =
                finishResp.ok ? 'Passkey registered!' : 'Registration failed.';
        } catch (e) {
            document.getElementById('passkey-msg').textContent = 'Error: ' + e.message;
        }
    }

    function base64urlDecode(str) {
        const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
    }

    function base64urlEncode(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        bytes.forEach(b => binary += String.fromCharCode(b));
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
</script>
</body>
</html>
